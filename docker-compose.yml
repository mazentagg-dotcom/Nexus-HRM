services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret_2024
      POSTGRES_DB: nexus_hrm
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_hrm"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hrm-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8120:8120"
    environment:
      SERVER_PORT: "8120"
      ENVIRONMENT: production
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: nexus
      DB_PASSWORD: nexus_secret_2024
      DB_NAME: nexus_hrm
      DB_SSL_MODE: disable
      JWT_SECRET: nhrm_prod_jwt_key_2024_secure_random_string_x9k2
      JWT_EXPIRY_HOURS: "24"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8120 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - hrm-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3050:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hrm-net

networks:
  hrm-net:
    driver: bridge

volumes:
  pgdata:
